name: Publish in DockerHub

on:  

push:
  branches:
    - main
  paths:
    - 'src/**'
    - 'pom.xml'
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Run tests
        run: mvn test
      - name: Generate Docker image
        run: mvn spring-boot:build-image -DskipTests -Dspring-boot.build-image.imageName=${{ secrets.DOCKERHUB_USERNAME }}/posts:v1
      - name: Login to DockerHub
        run: docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" -p "${{ secrets.DOCKERHUB_TOKEN }}" 
      - name: Push image to DockerHub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/posts:v1


#Vamos a hacer que las versiones del workflow y pom.xml coincidan

name: Generate tag
run: echo "tag=$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)" >> $GITHUB_OUTPUT #capturamos la tag
id: project

name: Generate Docker image
 run: |
    mvn spring-boot:build-image -DskipTests
          -Dspring-boot.build-image.imageName=
                ${{ secrets.DOCKERHUB_USERNAME }}/posts:${{ steps.project.outputs.tag }}