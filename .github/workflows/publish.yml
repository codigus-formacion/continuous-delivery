name: Publish in DockerHub

on:  
  push: # CORREGIDO: Debe estar indentado dentro de 'on'
    branches:
      - main
    paths:
      - 'src/**'
      - 'pom.xml'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Te recomiendo v4, v6 aún no existe oficialmente
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Run tests
        run: mvn test

      # --- NUEVOS PASOS INTEGRADOS CORRECTAMENTE ---

      - name: Generate tag
        id: project # 'id' debe estar dentro del paso, antes o después de 'name'
        run: echo "tag=$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)" >> $GITHUB_OUTPUT
        
      - name: Generate Docker image
        # CORREGIDO: Uso de '\' para unir el comando en varias líneas
        run: |
          mvn spring-boot:build-image -DskipTests \
          -Dspring-boot.build-image.imageName=${{ secrets.DOCKERHUB_USERNAME }}/posts:${{ steps.project.outputs.tag }}

      - name: Login to DockerHub
        run: docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" -p "${{ secrets.DOCKERHUB_TOKEN }}" 
        
      - name: Push image to DockerHub
        # CORREGIDO: Ahora el push también usa la tag dinámica, no la 'v1' fija
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/posts:${{ steps.project.outputs.tag }}